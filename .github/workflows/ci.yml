name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate syntax
        run: |
          python -m compileall bdc main.py mcp_server.py

      - name: Import smoke test
        run: |
          python - <<'PY'
          import bdc.config
          import bdc.client
          import bdc.state
          import bdc.downloader
          import bdc.ingest
          print("Import checks passed")
          PY
